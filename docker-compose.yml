services:
  db:
    image: postgres:16-alpine
    container_name: sati-db
    environment:
      POSTGRES_DB: sati
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - sati_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sati"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: sati-backend
    environment:
      ENVIRONMENT: development
      DEBUG: "true"
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/sati
      FRONTEND_URL: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000,http://localhost:8031
      AUTH_COOKIE_SECURE: "false"
      WHATSAPP_VERIFY_TOKEN: dev-whatsapp-token
      WHATSAPP_DEFAULT_TENANT_SLUG: tenda-rj
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: sati-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  sati_postgres_data:
