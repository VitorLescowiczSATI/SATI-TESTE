services:
  - type: web
    name: sati-backend
    runtime: docker
    plan: free
    region: ohio
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: sati-postgres
          property: connectionString
      - key: CORS_ORIGINS
        value: https://sati-frontend.onrender.com,http://localhost:3000,http://localhost:8031
      - key: FRONTEND_URL
        value: https://sati-frontend.onrender.com
      - key: AUTH_COOKIE_SECURE
        value: "true"
      - key: AUTH_COOKIE_SAMESITE
        value: none
      - key: SEED_ADMIN_EMAIL
        value: vitor.lesco@satiia.com.br
      - key: SEED_ADMIN_NAME
        value: Vitor Lescowicz
      - key: SEED_ADMIN_PASSWORD
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_DEFAULT_TENANT_SLUG
        value: tenda-rj
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini

  - type: web
    name: sati-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://sati-backend-w0qx.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: sati-postgres
    plan: free
    region: ohio
    databaseName: sati
    user: sati
    postgresMajorVersion: "16"
